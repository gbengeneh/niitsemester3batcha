spring:
  application:
    name: payroll-service

  datasource:
    url: jdbc:postgresql://localhost:5432/payroll_db
    username: postgres
    password: Jed2008$
    driver-class-name: org.postgresql.Driver


  jpa:
    hibernate:
      ddl-auto: validate   # Flyway owns the schema, Hibernate should never auto-generate it
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8881

# Custom property used by EmployeeClient / RestClientConfig
employee:
  service:
    url: ${EMPLOYEE_SERVICE_URL:http://localhost:8081}

# springdoc-openapi
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.company.payroll: INFO
