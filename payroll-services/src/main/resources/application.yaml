spring:
  application:
    name: payroll-service

  datasource:
    url: jdbc:postgresql://localhost:5432/payroll_db?createDatabaseIfNotExist=true
    username: postgres
    password: 123
    driver-class-name: org.postgresql.Driver


  jpa:
    hibernate:
      ddl-auto: validate   # Flyway owns the schema, Hibernate should never auto-generate it
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 9008

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# springdoc-openapi
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.company.payroll: INFO
