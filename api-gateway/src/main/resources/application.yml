server:
  port: 9080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      # Explicit routes (not the discovery locator) so the path each service
      # actually exposes is obvious to students reading this file.
      discovery:
        locator:
          enabled: false
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**

        - id: organization
          uri: lb://organization
          predicates:
            - Path=/api/organizations/**

        - id: department-service
          uri: lb://department-service
          predicates:
            - Path=/api/departments/**

        - id: employee-service
          uri: lb://employee-service
          predicates:
            - Path=/api/v1/employees/**

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**

        - id: leave-service
          uri: lb://leave-service
          predicates:
            - Path=/api/v1/leaves/**

        - id: payroll-service
          uri: lb://payroll-service
          predicates:
            - Path=/api/payroll/**

        - id: attendance-service
          uri: lb://attendance-service
          predicates:
            - Path=/api/attendance/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

logging:
  level:
    org.springframework.cloud.gateway: INFO
