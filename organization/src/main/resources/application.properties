spring.application.name=organization

server.port=9002

spring.datasource.url=jdbc:mysql://localhost:3306/organization_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Must be identical to user-service's app.jwt.secret - it is what lets this
# service verify tokens issued by user-service without calling it.
app.jwt.secret=ReplaceWithAStrongSecretAtLeast32CharsLong!