server:
  port: 9007

spring:
  application:
    name: attendance-service

  # ---- Default: in-memory H2, zero setup, good for class demos ----
  datasource:
    url: jdbc:h2:mem:attendancedb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  # ---- Swap in MySQL for a more "real" setup ----
  # datasource:
  #   url: jdbc:mysql://localhost:3306/attendancedb?createDatabaseIfNotExist=true
  #   driver-class-name: com.mysql.cj.jdbc.Driver
  #   username: root
  #   password: root

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /v3/api-docs