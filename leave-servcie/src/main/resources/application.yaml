server:
  port: 9006

spring:
  application:
    name: leave-service
  datasource:
    url: jdbc:h2:mem:leavedb
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true

# Hardcoded service endpoints before moving to Spring Cloud Registry (Eureka)
# (ports corrected to match each service's actual server.port)
services:
  employee-service:
    url: http://localhost:9004
  notification-service:
    url: http://localhost:9005

# Must be identical to user-service's app.jwt.secret - it is what lets this
# service verify tokens issued by user-service without calling it.
app:
  jwt:
    secret: ReplaceWithAStrongSecretAtLeast32CharsLong!