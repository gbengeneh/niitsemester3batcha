server:
  port: 8083

spring:
  application:
    name: leave-service
  datasource:
    url: jdbc:h2:mem:leavedb
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true

# Hardcoded service endpoints before moving to Spring Cloud Registry (Eureka)
services:
  employee-service:
    url: http://localhost:8081
  notification-service:
    url: http://localhost:8084