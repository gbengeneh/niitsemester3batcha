spring.application.name=employee-service


# ===============================
# SERVER CONFIG
# ===============================
server.port=9004

# ===============================
# DATABASE (JPA - using H2 for easy start)
# ===============================
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Enable H2 console (optional)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# LDAP CONFIG (basic setup)
# ===============================
spring.ldap.urls=ldap://localhost:8389
spring.ldap.base=dc=springframework,dc=org
spring.ldap.username=uid=admin,ou=system
spring.ldap.password=secret

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework=INFO

# ===============================
# JWT (must match user-service's app.jwt.secret - this service only verifies)
# ===============================
app.jwt.secret=ReplaceWithAStrongSecretAtLeast32CharsLong!

# ===============================
# Downstream services this service validates against
# ===============================
services.department-service.url=http://localhost:9003
services.organization-service.url=http://localhost:9002