spring.application.name=department-service
server.port=9003

spring.datasource.url=jdbc:mysql://localhost:3306/department_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Must be identical to user-service's app.jwt.secret - it is what lets this
# service verify tokens issued by user-service without calling it.
app.jwt.secret=ReplaceWithAStrongSecretAtLeast32CharsLong!

# Downstream service this service validates department.organizationId against
services.organization-service.url=http://localhost:9002
